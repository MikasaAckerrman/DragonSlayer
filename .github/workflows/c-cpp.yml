name: Build & Deploy Android APK
on:
  push:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode: full (all architectures) or quick (arm64-v8a only)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick

# Single build per ref. Without this, an open PR caused EVERY push to
# trigger two runs (push event + pull_request synchronize) = two APKs and
# doubled CI minutes. pull_request trigger removed (push already builds
# same-repo branches); concurrency cancels superseded runs on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Slayer3D: only Android APK is built and released. All desktop, console
# and Flatpak targets are intentionally disabled - they're not needed for
# this fork and only burn CI minutes / clutter the Releases page.

permissions:
  contents: write

jobs:
  build:
    name: "Build Android APK (multiarch)"
    runs-on: ubuntu-latest
    env:
      # Used by scripts/gha/deps_android.sh to fetch SDL2 source tarball.
      # Bump in lockstep with upstream FWGS when needed.
      SDL_VERSION: 2.32.10
      GH_CPU_ARCH: multiarch
      GH_CPU_OS: android
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
        token: ${{ secrets.MAINUI_PAT || github.token }}
    - name: Install dependencies
      run: bash scripts/gha/deps_android.sh
    - name: Build engine
      env:
        FWGS_PFX_PASSWORD: ${{ secrets.FWGS_PFX_PASSWORD }}
        SLAYER_BUILD_MODE: ${{ github.event.inputs.build_mode || 'full' }}
      run: bash scripts/gha/build_android.sh
    # Publish the APK as a GitHub *Release asset* rather than an Actions
    # artifact. Release assets do NOT count against the 0.5 GB Actions
    # storage quota (only upload-artifact does), so this delivery path is
    # immune to the quota that was blocking every build. It also works on
    # any branch and yields a stable download URL for the APK.
    - name: Publish APK to Release
      if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -eux
        REF_NAME="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"
        SAFE="${REF_NAME//\//-}"
        if [ "$REF_NAME" = "master" ]; then
          TAG="continuous"; TITLE="Slayer3D continuous build"
        else
          TAG="ci-$SAFE"; TITLE="Slayer3D CI build ($REF_NAME)"
        fi
        # Replace any previous release on this tag so the asset list stays
        # clean and the download URL is predictable.
        gh release delete "$TAG" --cleanup-tag --yes || true
        gh release create "$TAG" \
          --title "$TITLE" \
          --notes "Automated Android build from \`$REF_NAME\` ($GITHUB_SHA)." \
          --target "$GITHUB_SHA" \
          artifacts/*
