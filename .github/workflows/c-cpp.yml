name: Build & Deploy Android APK
# Slayer3D: triggers are intentionally narrow.
#   * push           - fires on every push to any branch in this repo,
#                      which is how feature branches and master alike
#                      get their continuous APK rebuilt.
#   * workflow_dispatch - manual run from the Actions tab, with the
#                      build_mode selector (full / quick).
# We deliberately do NOT subscribe to `pull_request`. Every commit
# pushed to a branch that already has an open PR would otherwise fire
# BOTH push and pull_request:synchronize events, building the APK
# twice and racing on the `continuous` release tag. The push event
# alone covers all in-repo branches; external fork PRs (which push
# does not trigger) are not part of this fork's workflow today.
on:
  push:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode: full (all architectures) or quick (arm64-v8a only)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick

# Cancel an in-flight build if a newer commit lands on the same ref.
# Without this, three rapid pushes (typical when iterating) would queue
# three back-to-back ~30-minute builds and only the last one's APK
# would ever ship - the earlier two just burn minutes.
concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

# Slayer3D: only Android APK is built and released. All desktop, console
# and Flatpak targets are intentionally disabled - they're not needed for
# this fork and only burn CI minutes / clutter the Releases page.

permissions:
  contents: write

jobs:
  build:
    name: "Build Android APK (multiarch)"
    runs-on: ubuntu-latest
    env:
      # Used by scripts/gha/deps_android.sh to fetch SDL2 source tarball.
      # Bump in lockstep with upstream FWGS when needed.
      SDL_VERSION: 2.32.10
      GH_CPU_ARCH: multiarch
      GH_CPU_OS: android
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Install dependencies
      run: bash scripts/gha/deps_android.sh
    - name: Build engine
      env:
        FWGS_PFX_PASSWORD: ${{ secrets.FWGS_PFX_PASSWORD }}
        SLAYER_BUILD_MODE: ${{ github.event.inputs.build_mode || 'full' }}
      run: bash scripts/gha/build_android.sh
    - name: Upload APK (artifact)
      uses: actions/upload-artifact@v7
      with:
        name: artifact-android-multiarch
        path: artifacts/*

  release:
    name: "Publish APK to Releases"
    runs-on: ubuntu-latest
    needs: [build]
    # Slayer3D: publish the 'continuous' release on every push, regardless
    # of branch, so feature branches (slayer3d/*) can be smoke-tested on
    # device without merging to master first. The tag is overwritten in
    # place, so master pushes always win the final slot.
    if: ${{ github.event_name == 'push' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download APK artifact
      uses: actions/download-artifact@v6
      with:
        name: artifact-android-multiarch
        path: ./apk
    - name: Replace 'continuous' release with new APK
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -eux
        TAG="continuous"
        TITLE="Slayer3D continuous build"
        # GitHub auto-attaches "Source code (zip)" and "Source code (tar.gz)"
        # to every release based on the tag, so we don't need to upload them.
        # Slayer3D: only ship the .apk on the Releases page. The R8 mapping
        # tar.gz stays inside the workflow artifact bundle for crash-log
        # de-obfuscation but does not clutter the user-facing download list.
        gh release delete "$TAG" --cleanup-tag --yes || true
        gh release create "$TAG" \
          --title "$TITLE" \
          --notes "Latest Android build from ${GITHUB_REF_NAME}. Source code archives are attached automatically by GitHub." \
          --target "$GITHUB_SHA" \
          ./apk/*.apk
